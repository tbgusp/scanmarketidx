name: Market Scan IDX

on:
  schedule:
    # Jam 06:00 WIB = 23:00 UTC malam sebelumnya
    # Senin-Jumat WIB = Minggu-Kamis UTC
    - cron: '0 23 * * 0-4'
  workflow_dispatch:
    # Tombol "Run workflow" manual di tab Actions GitHub

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 anthropic

      - name: Inject secrets ke config
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN_SCAN:  ${{ secrets.SCAN_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python inject_secrets.py

      - name: Jalankan Market Scan
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN_SCAN:  ${{ secrets.SCAN_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python main.py

      - name: Simpan log untuk debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ github.run_id }}
          path: scraper.log
          retention-days: 7
